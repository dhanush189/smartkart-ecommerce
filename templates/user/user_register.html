{% extends "admin/base.html" %}

{% block title %}SmartKart - User Registration{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Create Customer Account</p>
    <h2>User Registration</h2>
    <p>Create an account to access product search, filters, and product details.</p>

    <form method="POST" action="{{ url_for('user_register') }}">
        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" placeholder="Your full name" required>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Create a password" required>
        </div>
        <div class="form-actions">
            <button type="submit">Register</button>
        </div>
    </form>

    <p class="auth-link">Already have an account? <a href="{{ url_for('user_login') }}">Login</a></p>
</section>
{% endblock %}
