{% extends "admin/base.html" %}

{% block title %}SmartKart - User Forgot Password{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Customer Recovery</p>
    <h2>Forgot Password</h2>
    <p>Enter your account email. We will send a secure password reset link.</p>

    <form method="POST" action="{{ url_for('user_forgot_password') }}">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-actions">
            <button type="submit">Send Reset Link</button>
            <a class="btn btn-secondary" href="{{ url_for('user_login') }}">Back to Login</a>
        </div>
    </form>
</section>
{% endblock %}
