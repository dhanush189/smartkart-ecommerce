{% extends "admin/base.html" %}

{% block title %}SmartKart - Admin Login{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Welcome Back</p>
    <h2>Admin Login</h2>
    <p>Sign in to manage your SmartKart products and profile.</p>

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="admin@example.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter your password" required>
        </div>
        <p class="auth-link" style="text-align:left; margin-top:10px;">
            <a href="{{ url_for('admin_forgot_password') }}">Forgot password?</a>
        </p>
        <div class="form-actions">
            <button type="submit">Login</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Choose another role</a>
        </div>
    </form>
    <p class="auth-link">New admin? <a href="{{ url_for('admin_signup') }}">Create an account</a></p>
</section>
{% endblock %}
