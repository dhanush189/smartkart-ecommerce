{% extends "admin/base.html" %}

{% block title %}SmartKart - Reset Admin Password{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Admin Recovery</p>
    <h2>Reset Password</h2>
    <p>Choose a new password for your admin account.</p>

    <form method="POST" action="{{ url_for('admin_reset_password', token=token) }}">
        <div class="field">
            <label for="password">New Password</label>
            <input id="password" type="password" name="password" placeholder="Enter new password" required>
        </div>
        <div class="field">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>
        <div class="form-actions">
            <button type="submit">Reset Password</button>
            <a class="btn btn-secondary" href="{{ url_for('admin_login') }}">Back to Login</a>
        </div>
    </form>
</section>
{% endblock %}
