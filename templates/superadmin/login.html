{% extends "admin/base.html" %}

{% block title %}SmartKart - Super Admin Login{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Owner Access</p>
    <h2>Super Admin Login</h2>
    <p>Sign in to monitor admins, products, orders, and global revenue.</p>

    <form method="POST" action="{{ url_for('superadmin_login') }}">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="owner@smartkart.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter password" required>
        </div>
        <p class="auth-link" style="text-align:left; margin-top:10px;">
            <a href="{{ url_for('superadmin_forgot_password') }}">Forgot password?</a>
        </p>
        <div class="form-actions">
            <button type="submit">Login</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Back to Home</a>
        </div>
    </form>

    <p class="auth-link">New super admin? <a href="{{ url_for('superadmin_register') }}">Create an account</a></p>
</section>
{% endblock %}
