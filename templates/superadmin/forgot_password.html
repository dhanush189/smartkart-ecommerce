{% extends "admin/base.html" %}

{% block title %}SmartKart - Super Admin Forgot Password{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Owner Recovery</p>
    <h2>Forgot Password</h2>
    <p>Enter your registered super admin email. We will send a secure reset link.</p>

    <form method="POST" action="{{ url_for('superadmin_forgot_password') }}">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="owner@example.com" required>
        </div>
        <div class="form-actions">
            <button type="submit">Send Reset Link</button>
            <a class="btn btn-secondary" href="{{ url_for('superadmin_login') }}">Back to Login</a>
        </div>
    </form>
</section>
{% endblock %}
