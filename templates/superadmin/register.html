{% extends "admin/base.html" %}

{% block title %}SmartKart - Super Admin Registration{% endblock %}

{% block content %}
<section class="form-card auth-card">
    <p class="eyebrow">Owner Access</p>
    <h2>Super Admin Registration</h2>
    <p>Create a super admin account for platform-level monitoring.</p>

    <form method="POST" action="{{ url_for('superadmin_register') }}">
        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" placeholder="Owner name" required>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="owner@example.com" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Create password" required>
        </div>
        <div class="field">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm password" required>
        </div>
        <div class="form-actions">
            <button type="submit">Register</button>
            <a class="btn btn-secondary" href="{{ url_for('superadmin_login') }}">Back to Login</a>
        </div>
    </form>
</section>
{% endblock %}
